

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerFlow — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="login-page">
    <div class="glass-card login-card">

      <div class="brand">
        <div class="brand-icon">CF</div>
        <h1 class="brand-name">CareerFlow</h1>
        <p class="brand-tagline">Track every application. Land every offer.</p>
      </div>

      <form id="loginForm" novalidate>

        <div class="field-group" id="emailGroup">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
          <span class="field-error">Please enter a valid email</span>
        </div>

        <div class="field-group" id="passGroup">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <span class="field-error">Password cannot be empty</span>
        </div>

        <div class="form-row">
          <label class="remember-label">
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span id="btnText">Sign in</span>
        </button>

      </form>

      <div class="divider"><span>or</span></div>

      <p class="signup-text">
        New here? <a href="#" class="link">Create your account</a>
      </p>

    </div>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
